<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ferreyra López">
    <meta name="theme-color" content="#001a4d">
    <meta name="description" content="Estudio Jurídico Ferreyra López - Asesoramiento Legal Integral">
    <title>Estudio Jurídico Ferreyra López</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="assets/logo.svg" alt="MORIL Logo" class="logo" loading="lazy">
        </div>

        <!-- Subtitle -->
        <p class="subtitle">Estudio Jurídico</p>

        <!-- Main Title -->
        <h1 class="main-title">FERREYRA LÓPEZ</h1>

        <!-- Description -->
        <p class="description">¿Necesitás asesoramiento jurídico integral? Elegí cómo contactarnos:</p>

        <!-- Buttons -->
        <div class="buttons-container">
            <button class="btn btn-phone" data-action="phone">
                <i class="fas fa-phone"></i>
                <span>Llamar al Estudio</span>
            </button>
            <button class="btn btn-email" data-action="email">
                <i class="fas fa-envelope"></i>
                <span>Enviar un Email</span>
            </button>
            <button class="btn btn-whatsapp" data-action="whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>Escribir por WhatsApp</span>
            </button>
        </div>
    </div>

    <!-- Social Icons -->
    <div class="social-icons">
        <a href="#" class="social-icon instagram" title="Instagram" aria-label="Seguir en Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="#" class="social-icon whatsapp" title="WhatsApp" aria-label="Contactar por WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Branding -->
    <div class="branding">
        <p>COMUNICATE<br>AHORA</p>
    </div>

    <!-- Safe Area Spacer (para notch en iPhone) -->
    <div class="safe-area-spacer"></div>

    <script src="script.js"></script>
</body>
</html>
