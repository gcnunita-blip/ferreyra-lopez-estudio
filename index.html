<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Jurídico Ferreyra López</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="assets/logo.svg" alt="MORIL Logo" class="logo">
        </div>

        <!-- Subtitle -->
        <p class="subtitle">Estudio Jurídico</p>

        <!-- Main Title -->
        <h1 class="main-title">FERREYRA LÓPEZ</h1>

        <!-- Description -->
        <p class="description">¿Necesitás asesoramiento jurídico integral? Elegí cómo contactarnos:</p>

        <!-- Buttons -->
        <div class="buttons-container">
            <button class="btn btn-phone">
                <i class="fas fa-phone"></i> Llamar al Estudio
            </button>
            <button class="btn btn-email">
                <i class="fas fa-envelope"></i> Enviar un Email
            </button>
            <button class="btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Escribir por WhatsApp
            </button>
        </div>
    </div>

    <!-- Social Icons -->
    <div class="social-icons">
        <a href="#" class="social-icon instagram" title="Instagram">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="#" class="social-icon whatsapp" title="WhatsApp">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Branding -->
    <div class="branding">
        <p>COMUNICATE<br>AHORA</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
